<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>診所結帳系統</title>
<style>
:root {
  --bg: #f7f5f2;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18);
  --text: #1a1a18;
  --text2: #6b6860;
  --text3: #9e9b96;
  --accent: #2c4a3e;
  --accent-light: #e8f0ec;
  --accent-text: #1a3028;
  --vip: #7a4f1e;
  --vip-bg: #fdf3e7;
  --mem: #1e4a7a;
  --mem-bg: #e7f0fd;
  --biz: #2a5c2a;
  --biz-bg: #e8f5e8;
  --warn-bg: #fff8e6;
  --warn: #8a6200;
  --err-bg: #fef0ef;
  --err: #c0392b;
  --ok-bg: #edf7f0;
  --ok: #1e6e3a;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: 'PingFang TC', 'Noto Sans TC', sans-serif; color: var(--text); font-size: 15px; }
body { padding-bottom: 40px; }

/* ── 頂部 ── */
.topbar { background: var(--accent); color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-title { font-size: 17px; font-weight: 600; letter-spacing: .5px; }
.topbar-sub { font-size: 12px; opacity: .7; }
.sync-indicator { font-size: 12px; opacity: .8; display: flex; align-items: center; gap: 5px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #6fcf97; }
.sync-dot.loading { background: #f2c94c; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── 分頁 ── */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 53px; z-index: 99; }
.tab-btn { flex: 1; padding: 12px 8px; font-size: 13px; font-weight: 500; color: var(--text2); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab-content { display: none; padding: 16px; max-width: 860px; margin: 0 auto; }
.tab-content.active { display: block; }

/* ── 卡片 ── */
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
.card-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

/* ── 表單 ── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--text2); font-weight: 500; }
.field input, .field select, .field textarea {
  padding: 9px 11px; border: 1px solid var(--border2); border-radius: var(--radius-sm);
  font-size: 14px; color: var(--text); background: var(--surface);
  width: 100%; font-family: inherit;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(44,74,62,.1);
}
.field select { cursor: pointer; }

/* ── 身分別 chips ── */
.id-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.id-chip { padding: 8px 18px; border: 1.5px solid var(--border2); border-radius: 100px; font-size: 14px; cursor: pointer; color: var(--text2); background: var(--surface); font-weight: 500; transition: all .15s; user-select: none; }
.id-chip.on-vip { border-color: var(--vip); background: var(--vip-bg); color: var(--vip); }
.id-chip.on-mem { border-color: var(--mem); background: var(--mem-bg); color: var(--mem); }
.id-chip.on-biz { border-color: var(--biz); background: var(--biz-bg); color: var(--biz); }

/* ── 搜尋建議 ── */
.name-wrap { position: relative; }
.suggest-box { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); z-index: 200; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.suggest-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); }
.suggest-item:last-child { border-bottom: none; }
.suggest-item:hover, .suggest-item:active { background: var(--surface2); }
.suggest-name { font-size: 14px; font-weight: 600; }
.suggest-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── 客戶狀態 ── */
.pkg-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.pkg-row:last-child { border-bottom: none; }
.badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 100px; font-weight: 600; }
.badge-green { background: var(--ok-bg); color: var(--ok); }
.badge-gray { background: var(--surface2); color: var(--text3); }
.badge-vip { background: var(--vip-bg); color: var(--vip); }
.badge-mem { background: var(--mem-bg); color: var(--mem); }
.credit-box { margin-top: 12px; padding: 12px 14px; border-radius: var(--radius-sm); }
.credit-box.vip { background: var(--vip-bg); }
.credit-box.mem { background: var(--mem-bg); }
.credit-box .credit-label { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
.credit-box.vip .credit-label { color: var(--vip); }
.credit-box.mem .credit-label { color: var(--mem); }
.credit-box .credit-amount { font-size: 22px; font-weight: 700; }
.credit-box.vip .credit-amount { color: var(--vip); }
.credit-box.mem .credit-amount { color: var(--mem); }

/* ── 療程表格 ── */
.therapy-thead { display: grid; gap: 8px; padding: 0 0 6px; border-bottom: 1px solid var(--border); }
.thead-buy { grid-template-columns: 1fr 80px 56px 100px 32px; }
.thead-svc { grid-template-columns: 1fr 80px 56px 1fr 32px; }
.therapy-thead span { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; }
.t-row { display: grid; gap: 8px; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
.t-row:last-child { border-bottom: none; }
.t-row-buy { grid-template-columns: 1fr 80px 56px 100px 32px; }
.t-row-svc { grid-template-columns: 1fr 80px 56px 1fr 32px; }
.t-row select, .t-row input[type=number], .t-row input[type=text] {
  padding: 6px 8px; border: 1px solid var(--border2); border-radius: var(--radius-sm);
  font-size: 13px; background: var(--surface); color: var(--text); width: 100%; font-family: inherit;
}
.unit-display { font-size: 13px; color: var(--text2); padding: 6px 4px; text-align: center; background: var(--surface2); border-radius: var(--radius-sm); font-weight: 500; }
.del-btn { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 0; line-height: 1; }
.del-btn:hover { color: var(--err); }
.add-row-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; padding: 8px 0; background: none; border: none; font-family: inherit; margin-top: 4px; }
.add-row-btn:hover { color: var(--accent); }

/* ── 警告 ── */
.warn-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px; border-radius: var(--radius-sm); margin-top: 6px; font-size: 13px; }
.warn-item.warn { background: var(--warn-bg); color: var(--warn); }
.warn-item.err { background: var(--err-bg); color: var(--err); }

/* ── 結帳付款 ── */
.pay-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.pay-chip { padding: 8px 16px; border: 1.5px solid var(--border2); border-radius: 100px; font-size: 13px; cursor: pointer; color: var(--text2); background: var(--surface); font-weight: 500; }
.pay-chip.on { border-color: var(--accent); background: var(--accent-light); color: var(--accent-text); }
.pay-entry { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
.pay-entry-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.pay-name { font-size: 14px; font-weight: 600; min-width: 76px; color: var(--text); }
.pay-input { padding: 7px 10px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; width: 140px; font-family: inherit; background: var(--surface); color: var(--text); }
.bank-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.bank-btn { padding: 6px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; color: var(--text2); background: var(--surface); font-family: inherit; }
.bank-btn.on { border-color: var(--accent); background: var(--accent-light); color: var(--accent-text); font-weight: 600; }
.sum-area { border-top: 1px solid var(--border); padding-top: 14px; margin-top: 14px; }
.sum-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
.sum-row .lbl { color: var(--text2); }
.sum-total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; padding: 10px 0; border-top: 1px solid var(--border); margin-top: 6px; }
.diff-bar { border-radius: var(--radius-sm); padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 13px; }
.diff-ok  { background: var(--ok-bg);   color: var(--ok);   }
.diff-warn{ background: var(--warn-bg); color: var(--warn); }
.diff-err { background: var(--err-bg);  color: var(--err);  }
.deduct-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; color: var(--mem); display: none; }

/* ── 儲值金卡片 ── */
.credit-deduct-card { border-radius: var(--radius-sm); padding: 14px; margin-bottom: 14px; }
.credit-deduct-card.vip { background: var(--vip-bg); border: 1px solid rgba(122,79,30,.2); }
.credit-deduct-card.mem { background: var(--mem-bg); border: 1px solid rgba(30,74,122,.2); }
.credit-row2 { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }

/* ── 預覽 ── */
.preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.preview-cell { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
.preview-cell .lbl { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
.preview-cell .val { font-size: 14px; font-weight: 600; color: var(--text); }
.preview-item-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.preview-item-row:last-child { border-bottom: none; }
.remain-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.remain-item:last-child { border-bottom: none; }

/* ── 按鈕 ── */
.btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
.btn-primary { padding: 12px 28px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; }
.btn-secondary { padding: 12px 22px; background: none; border: 1.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; font-family: inherit; color: var(--text); }
.btn-submit { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 6px; }
.btn-submit:disabled { opacity: .35; cursor: not-allowed; }

/* ── toast ── */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a18; color: #fff; padding: 12px 22px; border-radius: 100px; font-size: 14px; font-weight: 500; z-index: 9999; opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── 歷史推薦人提示 ── */
.ref-note { background: var(--surface2); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; color: var(--text2); margin-top: 8px; display: none; }

/* ── 送出成功覆蓋層 ── */
.success-overlay { position: fixed; inset: 0; background: rgba(44,74,62,.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9000; display: none; color: #fff; text-align: center; padding: 32px; }
.success-icon { font-size: 56px; margin-bottom: 16px; }
.success-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.success-id { font-size: 14px; opacity: .75; margin-bottom: 28px; }
.btn-new { padding: 14px 36px; background: #fff; color: var(--accent); border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }

/* ── 響應式 ── */
@media(max-width: 600px) {
  .grid3, .grid4 { grid-template-columns: 1fr 1fr; }
  .preview-grid { grid-template-columns: 1fr 1fr; }
  .thead-buy, .t-row-buy { grid-template-columns: 1fr 72px 50px 88px 28px; }
  .thead-svc, .t-row-svc { grid-template-columns: 1fr 72px 50px 1fr 28px; }
}
@media(max-width: 420px) {
  .grid2, .grid3, .grid4 { grid-template-columns: 1fr; }
  .preview-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">診所結帳系統</div>
  </div>
  <div class="sync-indicator" id="sync-indicator">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text">已連線</span>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="goTab('order',this)">訂單資料</button>
  <button class="tab-btn" onclick="goTab('payment',this)">結帳付款</button>
  <button class="tab-btn" onclick="goTab('preview',this)">確認送出</button>
</div>

<!-- ══════════ TAB 1 訂單資料 ══════════ -->
<div class="tab-content active" id="tab-order">

  <div class="card">
    <div class="card-title">客戶身分別</div>
    <div class="id-chips">
      <div class="id-chip" id="idchip-vip" onclick="selectId('vip')">VIP</div>
      <div class="id-chip" id="idchip-mem" onclick="selectId('mem')">會員</div>
      <div class="id-chip" id="idchip-biz" onclick="selectId('biz')">業務夥伴</div>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-top:8px">不勾選視為一般客戶；結帳頁依身分顯示對應儲值金</div>
  </div>

  <div class="card">
    <div class="card-title">客戶基本資料</div>
    <div class="grid3" style="margin-bottom:12px">
      <div class="field name-wrap">
        <label>客戶姓名</label>
        <input id="f-name" type="text" placeholder="輸入姓名搜尋" oninput="onNameInput()" autocomplete="off">
        <div class="suggest-box" id="suggest-box" style="display:none"></div>
      </div>
      <div class="field"><label>電話</label><input id="f-phone" type="tel" placeholder="0912-345-678"></div>
      <div class="field"><label>生日</label><input id="f-birth" type="date"></div>
    </div>
    <div class="grid4">
      <div class="field"><label>負責人</label>
        <select id="f-owner"><option value="">請選擇</option><option>Polly</option><option>Irene</option><option>Gina</option><option>蔡蔡</option></select>
      </div>
      <div class="field"><label>執行醫師</label>
        <select id="f-doctor"><option value="">請選擇</option><option>王瑋璨</option><option>李宗晏</option><option>葉艾芸</option><option>莊鈞智</option></select>
      </div>
      <div class="field"><label>推薦人</label>
        <select id="f-ref"><option value="">請選擇</option><option>蕭安里</option><option>Miko(邱芷畇)</option><option>王婷奕</option><option>牛牛(劉苡沙)</option><option>芷葳(廖芷涵)</option><option>尤允希</option><option>許滾兒(許芯瑀)</option><option>黃D(黃郁茹)</option><option>昆妮(黃懿)</option><option>麥麥(鄭珈詩)</option><option>MiMi(林孟萱)</option><option>Abby(陳仕英)</option><option>Irene(江苡綸)</option><option>小荳(陳守庭)</option><option>77(林明欣)</option><option>言言(許庭瑄)</option><option>Fairy(蔡宛臻)</option><option>方若葳</option><option>張嘉玲</option><option>蔡予柔</option><option>Lica(楊馨捷)</option><option>甘惠榕</option><option>蘇蘇(蘇怡庭)</option><option>Nina(葉璇)</option><option>賴凱誼</option><option>妃妃(林家妃)</option><option>傅榮惠</option><option>范任鈞</option><option>陳嬿如</option><option>陳依渲</option><option>李采憶</option><option>Gina(劉錦宜)</option><option>陳春樺</option><option>57 林緯昕</option><option>小蘇(蘇閔貽)</option><option>Ava(劉俞欣)</option><option>張登傑</option><option>林庭嬅</option><option>曾思瑀</option></select>
      </div>
      <div class="field"><label>管道來源</label>
        <select id="f-source"><option value="">請選擇</option><option>Polly IG</option><option>Polly 抖音</option><option>Polly thread</option><option>診所 IG</option><option>診所 抖音</option><option>診所 threads</option><option>路過</option><option>Google</option><option>業務</option><option>朋友介紹</option><option>Dcard</option><option>網紅行銷</option><option>王醫師</option><option>李醫師</option><option>小艾醫師</option><option>會員</option><option>其他</option></select>
      </div>
    </div>
    <div class="ref-note" id="ref-note"></div>
  </div>

  <div class="card" id="client-status-card" style="display:none">
    <div class="card-title">客戶帳戶狀態</div>
    <div id="client-status-body"></div>
  </div>

  <div class="card">
    <div class="card-title">購買療程</div>
    <div class="therapy-thead thead-buy">
      <span>療程內容</span><span>數量</span><span>單位</span><span>金額(NT$)</span><span></span>
    </div>
    <div id="purchase-list"></div>
    <button class="add-row-btn" onclick="addBuyRow()">＋ 新增購買項目</button>
  </div>

  <div class="card">
    <div class="card-title">施作療程（今日核銷）</div>
    <div class="therapy-thead thead-svc">
      <span>施作內容</span><span>數量</span><span>單位</span><span>備註</span><span></span>
    </div>
    <div id="service-list"></div>
    <div id="svc-warnings"></div>
    <button class="add-row-btn" onclick="addSvcRow()">＋ 新增施作項目</button>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="goTab('payment',document.querySelectorAll('.tab-btn')[1])">下一步：結帳付款 →</button>
  </div>
</div>

<!-- ══════════ TAB 2 結帳付款 ══════════ -->
<div class="tab-content" id="tab-payment">

  <div class="card" id="credit-deduct-card" style="display:none">
    <div class="card-title">儲值金折抵</div>
    <div class="credit-deduct-card" id="cdc-inner">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div id="credit-type-label" style="font-size:13px;font-weight:600;margin-bottom:2px"></div>
          <div id="credit-remain-val" style="font-size:22px;font-weight:700"></div>
        </div>
        <div class="field" style="width:160px">
          <label id="credit-input-label">折抵金額</label>
          <input type="number" id="credit-deduct" placeholder="0" min="0" oninput="onDeductInput()" style="font-size:15px">
          <div id="credit-err" style="font-size:12px;color:var(--err);margin-top:3px;display:none">不可超過餘額</div>
        </div>
      </div>
      <div id="credit-after" style="font-size:13px;margin-top:8px;opacity:.8"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">付款方式（可多選）</div>
    <div class="pay-chips">
      <div class="pay-chip" id="chip-現金" onclick="togglePay('現金')">現金</div>
      <div class="pay-chip" id="chip-無卡分期" onclick="togglePay('無卡分期')">無卡分期</div>
      <div class="pay-chip" id="chip-轉帳" onclick="togglePay('轉帳')">轉帳</div>
    </div>
    <div id="pay-entries"></div>
    <div class="sum-area">
      <div class="sum-row"><span class="lbl">購買小計</span><span id="sum-sub">NT$ 0</span></div>
      <div class="deduct-row" id="deduct-row"><span id="deduct-row-label">儲值金折抵</span><span id="deduct-row-val">-NT$ 0</span></div>
      <div class="sum-row">
        <span class="lbl">折扣</span>
        <span style="display:flex;align-items:center;gap:8px">
          <input type="number" id="discount" value="0" min="0" oninput="calcTotal()" style="width:90px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text)">
          <span style="font-size:13px;color:var(--text2)">元</span>
        </span>
      </div>
      <div class="sum-total-row"><span>應付總額</span><span id="sum-total" style="color:var(--accent)">NT$ 0</span></div>

  <div class="card">
    <div class="field"><label>備註</label>

  <div class="btn-row">
    <button class="btn-secondary" onclick="goTab('order',document.querySelectorAll('.tab-btn')[0])">← 上一步</button>
    <button class="btn-primary" onclick="goTab('preview',document.querySelectorAll('.tab-btn')[2])">確認預覽 →</button>

</div>

    <div id="p-credit-section" style="display:none;border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">

    <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">
      <div class="card-title">購買療程明細</div>

    <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">

      <div id="p-remain"></div>
    </div>

    <div id="p-note-section" style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px;display:none">
      <div class="card-title">備註</div>
      <div id="p-note-val" style="font-size:14px"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="goTab('payment',document.querySelectorAll('.tab-btn')[1])">← 返回修改</button>
  </div>
  <button class="btn-submit" id="submit-btn" onclick="submitOrder()">確認結帳並寫入 Google Sheets</button>

<!-- 送出成功覆蓋層 -->
<div class="success-overlay" id="success-overlay">
  <div class="success-icon">✓</div>
  <div class="success-title">結帳成功！</div>
  <div class="success-id" id="success-order-id"></div>
  <button class="btn-new" onclick="resetAll()">新增下一筆訂單</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  設定：貼上你的 Apps Script 部署網址
// ══════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby8B2h-xFiHvI81mFL2tmpYmQ6VaDXXsB9khA1PepOWn5VCkZom8xztFJe2AjD79h8B/exec';
// ↑↑↑ 部署後把 YOUR_DEPLOYMENT_ID 換成真實的 ID ↑↑↑

// ── 療程 → 單位對應 ──
const THERAPY_UNIT = {
  '電波鳳凰900':'發','電波鳳凰碧眼':'發','電波鳳凰身體':'發','電波十倍大玉璽':'發','電波十倍900':'發','電波十倍眼周':'發','音波美國':'發','Z音波':'發',
  'Onda pro':'區','除毛':'區',
  '雷射皮秒':'堂','局部雷射皮秒':'堂','雷射皮秒蜂巢':'堂','局部雷射皮秒蜂巢':'堂','水光HA':'堂','美療清粉刺':'堂','疤痕修復術':'堂','芝潤水光':'堂','水飛梭':'堂','蝴蝶電波':'堂',
  '填充精靈針':'罐','外泌體':'罐','保養品':'罐','法蜜齡慕斯':'罐',
  '填充提奧希':'cc','填充喬雅登':'cc','填充德馬芙':'cc','填充Ellanse M':'cc','逆時針':'cc','填充膠原蛋白':'cc','填充晶亮瓷':'cc','降解酶':'cc','消疤針':'cc',
  '埋線魚骨':'條','埋線隆鼻':'條',
  '肉毒Botox':'u','肉毒奇蹟':'u',
  '消脂針':'組',
  '防曬點滴':'支','客製化點滴':'支','嫩膚點滴':'支','保肝點滴':'支','消脂點滴':'支','法蜜齡(支)':'支',
  '六木顏面膜':'片',
  '止痛針':'次','猛健樂2.5':'次','猛健樂5':'次','猛健樂7.5':'次','猛健樂10':'次',
};
const THERAPY_LIST = Object.keys(THERAPY_UNIT);
const TH_OPTS = '<option value="">請選擇療程</option>' + THERAPY_LIST.map(t=>`<option value="${t}">${t}</option>`).join('');

// ── 狀態 ──
let CLIENT_DB = [];
let currentId = '';
let selectedClient = null;
let suggestMatches = [];
const payState = {};

// ── 載入客戶資料 ──
async function loadClients() {
  setSyncState('loading', '載入客戶資料…');
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=getClients');
    const json = await res.json();
    if (json.status === 'ok') {
      CLIENT_DB = json.clients || [];
      setSyncState('ok', `已連線 (${CLIENT_DB.length} 位客戶)`);
    } else { throw new Error(json.message); }
  } catch(e) {
    setSyncState('err', '離線模式');
    showToast('⚠ 無法連線，使用離線模式');
  }
}

function setSyncState(state, text) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = 'sync-dot' + (state==='loading'?' loading':'');
  dot.style.background = state==='ok'?'#6fcf97':state==='loading'?'#f2c94c':'#eb5757';
  txt.textContent = text;
}

// ── 初始化療程列 ──
function initRows() {
  addBuyRow(); addSvcRow();
}

// ── 分頁切換 ──
function goTab(name, el) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='payment') setupPaymentTab();
  if(name==='preview') buildPreview();
  window.scrollTo(0,0);
}

// ── 身分別 ──
function selectId(t) {
  if(currentId===t){currentId='';document.getElementById('idchip-'+t).className='id-chip';}
  else{['vip','mem','biz'].forEach(x=>document.getElementById('idchip-'+x).className='id-chip');currentId=t;document.getElementById('idchip-'+t).className='id-chip on-'+t;}
}

// ── 姓名搜尋 ──
function onNameInput() {
  const val = document.getElementById('f-name').value.trim();
  const box = document.getElementById('suggest-box');
  selectedClient = null;
  document.getElementById('client-status-card').style.display = 'none';
  document.getElementById('ref-note').style.display = 'none';
  if (!val) { box.style.display = 'none'; return; }
  suggestMatches = CLIENT_DB.filter(c => c.name.includes(val));
  if (!suggestMatches.length) { box.style.display = 'none'; return; }
  const idLabel = {vip:'VIP',mem:'會員',biz:'業務夥伴','':'一般'};
  box.innerHTML = suggestMatches.map((c,i)=>`
    <div class="suggest-item" onclick="pickClient(${i})">
      <div class="suggest-name">${c.name} <span class="badge badge-gray" style="font-size:10px">${idLabel[c.id]||'一般'}</span></div>
      <div class="suggest-sub">生日 ${c.birth}　電話 ${c.phone}</div>
    </div>`).join('');
  box.style.display = 'block';
}

function pickClient(i) {
  const c = suggestMatches[i];
  selectedClient = c;
  document.getElementById('f-name').value = c.name;
  document.getElementById('f-phone').value = c.phone;
  document.getElementById('f-birth').value = c.birth;
  document.getElementById('suggest-box').style.display = 'none';
  currentId = c.id || '';
  ['vip','mem','biz'].forEach(t=>document.getElementById('idchip-'+t).className='id-chip');
  if(currentId) document.getElementById('idchip-'+currentId).className='id-chip on-'+currentId;
  if(c.ref) {
    const note = document.getElementById('ref-note');
    note.style.display = 'block';
    note.innerHTML = `歷史推薦人：<strong>${c.ref}</strong>（已自動帶入）`;
    const sel = document.getElementById('f-ref');
    for(let o of sel.options){if(o.value===c.ref){sel.value=c.ref;break;}}
  }
  renderClientStatus(c);
  checkSvcWarnings();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.name-wrap')) document.getElementById('suggest-box').style.display='none';
});

// ── 客戶帳戶狀態 ──
function renderClientStatus(c) {
  document.getElementById('client-status-card').style.display = 'block';
  const active = (c.packages||[]).filter(p=>p.used<p.total);
  const done = (c.packages||[]).filter(p=>p.used>=p.total);
  let html = '';
  if(active.length) {
    html += `<div style="font-size:13px;font-weight:600;margin-bottom:8px">未使用完課程</div>`;
    active.forEach(p=>{
      const rem = p.total-p.used;
      html += `<div class="pkg-row"><span><strong>${p.name}</strong><span style="color:var(--text3);font-size:12px;margin-left:6px">（${p.date}）</span></span><span style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:var(--text2)">${p.used}/${p.total} ${p.unit} 已用</span><span class="badge badge-green">剩 ${rem} ${p.unit}</span></span></div>`;
    });
  } else html += `<div style="font-size:13px;color:var(--text3);padding:4px 0">無未使用課程</div>`;
  if(done.length){
    html += `<div style="font-size:12px;color:var(--text3);margin:10px 0 6px">已核銷完畢</div>`;
    done.forEach(p=>{html+=`<div class="pkg-row" style="opacity:.4"><span>${p.name}</span><span class="badge badge-gray">已用完</span></div>`;});
  }
  if(c.id==='vip'&&c.vip_remain!=null) html+=`<div class="credit-box vip"><div class="credit-label">VIP 儲值金餘額</div><div class="credit-amount">NT$ ${c.vip_remain.toLocaleString()}</div></div>`;
  else if(c.id==='mem'&&c.mem_remain!=null) html+=`<div class="credit-box mem"><div class="credit-label">會員儲值金餘額</div><div class="credit-amount">NT$ ${c.mem_remain.toLocaleString()}</div></div>`;
  document.getElementById('client-status-body').innerHTML = html;
}

// ── 購買療程行 ──
function addBuyRow() {
  const d = document.createElement('div'); d.className='t-row t-row-buy';
  d.innerHTML = `<select onchange="onTherapyChange(this,'buy')">${TH_OPTS}</select>
    <input type="number" value="1" min="1" max="9999" style="width:80px" oninput="checkSvcWarnings()">
    <div class="unit-display">—</div>
    <input type="number" placeholder="0" oninput="calcTotal()">
    <button class="del-btn" onclick="this.closest('.t-row-buy').remove();calcTotal();checkSvcWarnings()">×</button>`;
  document.getElementById('purchase-list').appendChild(d);
}

// ── 施作療程行 ──
function addSvcRow() {
  const d = document.createElement('div'); d.className='t-row t-row-svc';
  d.innerHTML = `<select onchange="onTherapyChange(this,'svc')">${TH_OPTS}</select>
    <input type="number" value="1" min="1" max="9999" style="width:80px" oninput="checkSvcWarnings()">
    <div class="unit-display">—</div>
    <input type="text" placeholder="備註">
    <button class="del-btn" onclick="this.closest('.t-row-svc').remove();checkSvcWarnings()">×</button>`;
  document.getElementById('service-list').appendChild(d);
}

function onTherapyChange(sel, type) {
  const name = sel.value;
  const row = sel.closest(type==='buy'?'.t-row-buy':'.t-row-svc');
  row.querySelector('.unit-display').textContent = THERAPY_UNIT[name] || '—';
  checkSvcWarnings();
  if(type==='buy') calcTotal();
}

// ── 施作療程數量檢查 ──
function getAvailQty(name) {
  let qty = 0;
  if(selectedClient)(selectedClient.packages||[]).filter(p=>p.name===name&&p.used<p.total).forEach(p=>qty+=p.total-p.used);
  document.querySelectorAll('#purchase-list .t-row-buy').forEach(r=>{
    if(r.querySelector('select').value===name) qty+=parseFloat(r.querySelectorAll('input')[0].value)||0;
  });
  return qty;
}

function checkSvcWarnings() {
  const el = document.getElementById('svc-warnings'); if(!el) return;
  const purchasedNames = new Set();
  document.querySelectorAll('#purchase-list .t-row-buy select').forEach(s=>{if(s.value)purchasedNames.add(s.value);});
  const remainNames = new Set();
  if(selectedClient)(selectedClient.packages||[]).filter(p=>p.used<p.total).forEach(p=>remainNames.add(p.name));
  const warns = [];
  document.querySelectorAll('#service-list .t-row-svc').forEach(r=>{
    const name = r.querySelector('select').value; if(!name) return;
    const qty = parseFloat(r.querySelectorAll('input')[0].value)||1;
    if(!purchasedNames.has(name)&&!remainNames.has(name)){
      warns.push({type:'warn',msg:`「${name}」不在今日購買或剩餘課程中，請確認`});
    } else {
      const avail = getAvailQty(name);
      if(qty>avail) warns.push({type:'err',msg:`「${name}」施作數量 ${qty}，超過可用數量 ${avail}，請確認`});
    }
  });
  el.innerHTML = warns.map(w=>`<div class="warn-item ${w.type}"><span style="font-weight:700;flex-shrink:0">${w.type==='err'?'✕':'⚠'}</span>${w.msg}</div>`).join('');
}

// ── 金額計算 ──
function calcTotal() {
  let sub = 0;
  document.querySelectorAll('#purchase-list .t-row-buy').forEach(r=>{
    sub += parseFloat(r.querySelectorAll('input')[1].value)||0;
  });
  const maxD = parseFloat(document.getElementById('credit-deduct')?.dataset.max)||0;
  const deduct = Math.min(parseFloat(document.getElementById('credit-deduct')?.value)||0, maxD);
  const disc = parseFloat(document.getElementById('discount')?.value)||0;
  const total = Math.max(0, sub-deduct-disc);
  const fmt = n=>'NT$ '+Math.round(n).toLocaleString();
  document.getElementById('sum-sub').textContent = fmt(sub);
  document.getElementById('sum-total').textContent = fmt(total);
  const dr = document.getElementById('deduct-row');
  if(deduct>0){ dr.style.display='flex'; document.getElementById('deduct-row-val').textContent='-'+fmt(deduct); document.getElementById('deduct-row-label').textContent=(currentId==='vip'?'VIP':'會員')+'儲值金折抵'; }
  else dr.style.display='none';
  const rem = Math.max(0,maxD-deduct);
  const ca = document.getElementById('credit-after');
  if(ca) ca.textContent = deduct>0?`折抵後剩餘：NT$ ${Math.round(rem).toLocaleString()}`:'';
  updateDiffBar();
}

// ── 結帳付款 setup ──
function setupPaymentTab() {
  const card = document.getElementById('credit-deduct-card');
  const c = selectedClient;
  if(!c||(currentId!=='vip'&&currentId!=='mem')){ card.style.display='none'; calcTotal(); return; }
  card.style.display = 'block';
  const isVip = currentId==='vip';
  const remain = isVip?(c.vip_remain||0):(c.mem_remain||0);
  const inner = document.getElementById('cdc-inner');
  inner.className = 'credit-deduct-card '+(isVip?'vip':'mem');
  document.getElementById('credit-type-label').textContent = isVip?'VIP 儲值金餘額':'會員儲值金餘額';
  document.getElementById('credit-remain-val').textContent = 'NT$ '+remain.toLocaleString();
  document.getElementById('credit-remain-val').style.color = isVip?'var(--vip)':'var(--mem)';
  document.getElementById('credit-input-label').textContent = (isVip?'VIP':'會員')+'儲值金折抵金額';
  const inp = document.getElementById('credit-deduct');
  inp.max = remain; inp.dataset.max = remain;
  calcTotal();
}

function onDeductInput() {
  const inp = document.getElementById('credit-deduct');
  const max = parseFloat(inp.dataset.max)||0;
  const val = parseFloat(inp.value)||0;
  const err = document.getElementById('credit-err');
  if(val>max){ err.style.display='block'; inp.value=max; }
  else err.style.display='none';
  calcTotal();
}

// ── 付款方式 ──
function togglePay(m) {
  const chip = document.getElementById('chip-'+m);
  if(payState[m]){ delete payState[m]; chip.classList.remove('on'); }
  else{ payState[m]={amount:'',bank:''}; chip.classList.add('on'); }
  renderPayEntries();
}

function renderPayEntries() {
  let html = '';
  Object.keys(payState).forEach(m=>{
    html += `<div class="pay-entry"><div class="pay-entry-row"><span class="pay-name">${m}</span>
      <input class="pay-input" type="number" placeholder="金額" value="${payState[m].amount}" oninput="payState['${m}'].amount=this.value;updateDiffBar()">
      <span style="font-size:13px;color:var(--text2)">元</span></div>`;
    if(m==='轉帳'){
      html+=`<div class="bank-btns">`;
      ['合庫','台新','中信','玉山'].forEach(b=>{ html+=`<button class="bank-btn ${payState[m].bank===b?'on':''}" onclick="setBank('${m}','${b}',this)">${b}</button>`; });
      html+=`</div>`;
    }
    html += `</div>`;
  });
  document.getElementById('pay-entries').innerHTML = html;
  updateDiffBar();
}

function setBank(m,b,el) {
  payState[m].bank=b;
  el.closest('.pay-entry').querySelectorAll('.bank-btn').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
}

function updateDiffBar() {
  const bar = document.getElementById('diff-bar'); if(!bar) return;
  const total = parseInt((document.getElementById('sum-total')?.textContent||'0').replace(/[^0-9]/g,''))||0;
  const paid = Object.values(payState).reduce((s,v)=>s+(parseFloat(v.amount)||0),0);
  const submitBtn = document.getElementById('submit-btn');
  if(!Object.keys(payState).length){ bar.innerHTML=''; if(submitBtn)submitBtn.disabled=false; return; }
  const diff = total-paid;
  const fmt = n=>'NT$ '+Math.round(Math.abs(n)).toLocaleString();
  if(diff===0){
    bar.innerHTML=`<div class="diff-bar diff-ok"><span style="font-weight:600">金額核對正確</span><span style="font-weight:600">已收 NT$ ${paid.toLocaleString()}</span></div>`;
    if(submitBtn)submitBtn.disabled=false;
  } else if(diff>0){
    bar.innerHTML=`<div class="diff-bar diff-warn"><span>尚未收足 <strong>NT$ ${diff.toLocaleString()}</strong></span><span>已輸入 NT$ ${paid.toLocaleString()} / 應付 NT$ ${total.toLocaleString()}</span></div>`;
    if(submitBtn)submitBtn.disabled=true;
  } else {
    bar.innerHTML=`<div class="diff-bar diff-err"><span>超收 <strong>NT$ ${Math.abs(diff).toLocaleString()}</strong></span><span>已輸入 NT$ ${paid.toLocaleString()} / 應付 NT$ ${total.toLocaleString()}</span></div>`;
    if(submitBtn)submitBtn.disabled=false;
  }
}

function getPaySummary() {
  const parts = Object.entries(payState).map(([m,v])=>{ let s=m; if(v.amount)s+=` NT$${parseInt(v.amount).toLocaleString()}`; if(m==='轉帳'&&v.bank)s+=`(${v.bank})`; return s; });
  const deduct = parseFloat(document.getElementById('credit-deduct')?.value)||0;
  if(deduct>0) parts.push((currentId==='vip'?'VIP':'會員')+`儲值金折抵 NT$${deduct.toLocaleString()}`);
  return parts.length?parts.join(' + '):'—';
}

// ── 計算剩餘療程 ──
function calcRemaining() {
  const map = {};
  if(selectedClient)(selectedClient.packages||[]).filter(p=>p.used<p.total).forEach(p=>{ map[p.name]=(map[p.name]||0)+(p.total-p.used); });
  document.querySelectorAll('#purchase-list .t-row-buy').forEach(r=>{
    const name=r.querySelector('select').value; if(!name)return;
    map[name]=(map[name]||0)+(parseFloat(r.querySelectorAll('input')[0].value)||0);
  });
  document.querySelectorAll('#service-list .t-row-svc').forEach(r=>{
    const name=r.querySelector('select').value; if(!name)return;
    map[name]=(map[name]||0)-(parseFloat(r.querySelectorAll('input')[0].value)||0);
  });
  return Object.entries(map).filter(([,q])=>q>0).map(([name,qty])=>({name,qty,unit:THERAPY_UNIT[name]||''}));
}

// ── 建立預覽 ──
function buildPreview() {
  document.getElementById('p-name').textContent = document.getElementById('f-name').value||'（未填）';
  document.getElementById('p-sub').textContent = [document.getElementById('f-birth').value, document.getElementById('f-phone').value].filter(Boolean).join('　');
  document.getElementById('p-owner').textContent = document.getElementById('f-owner').value||'—';
  document.getElementById('p-doctor').textContent = document.getElementById('f-doctor').value||'—';
  document.getElementById('p-ref').textContent = document.getElementById('f-ref').value||'—';
  document.getElementById('p-source').textContent = document.getElementById('f-source').value||'—';
  document.getElementById('p-pay').textContent = getPaySummary();
  document.getElementById('p-total').textContent = document.getElementById('sum-total').textContent;
  const idBadge = document.getElementById('p-id-badge');
  const idMap = {vip:'VIP',mem:'會員',biz:'業務夥伴','':'一般'};
  idBadge.textContent = idMap[currentId]||'一般';
  idBadge.className = 'badge '+(currentId==='vip'?'badge-vip':currentId==='mem'?'badge-mem':currentId==='biz'?'badge-green':'badge-gray');

  const deduct = parseFloat(document.getElementById('credit-deduct')?.value)||0;
  const maxD = parseFloat(document.getElementById('credit-deduct')?.dataset.max)||0;
  const pcs = document.getElementById('p-credit-section');
  if(deduct>0){ pcs.style.display='block'; document.getElementById('p-credit-detail').innerHTML=`<div class="preview-item-row"><span>${currentId==='vip'?'VIP':'會員'}儲值金折抵</span><span style="color:var(--ok)">折抵後剩 NT$ ${Math.max(0,maxD-deduct).toLocaleString()}</span></div>`; }
  else pcs.style.display='none';

  let bhtml='';
  document.querySelectorAll('#purchase-list .t-row-buy').forEach(r=>{
    const name=r.querySelector('select').value; if(!name)return;
    const qty=r.querySelectorAll('input')[0].value||1;
    const unit=r.querySelector('.unit-display').textContent;
    const price=parseFloat(r.querySelectorAll('input')[1].value)||0;
    bhtml+=`<div class="preview-item-row"><span>${name} × ${qty} ${unit}</span><span>NT$ ${price.toLocaleString()}</span></div>`;
  });
  document.getElementById('p-buy-items').innerHTML = bhtml||'<span style="font-size:13px;color:var(--text3)">無</span>';

  let shtml='';
  document.querySelectorAll('#service-list .t-row-svc').forEach(r=>{
    const name=r.querySelector('select').value; if(!name)return;
    const qty=r.querySelectorAll('input')[0].value||1;
    const unit=r.querySelector('.unit-display').textContent;
    const note=r.querySelector('input[type=text]').value||'';
    shtml+=`<div class="preview-item-row"><span>${name} × ${qty} ${unit}</span><span style="color:var(--text2)">${note}</span></div>`;
  });
  document.getElementById('p-svc-items').innerHTML = shtml||'<span style="font-size:13px;color:var(--text3)">無</span>';

  const remaining = calcRemaining();
  document.getElementById('p-remain').innerHTML = remaining.length
    ? remaining.map(r=>`<div class="remain-item"><span>${r.name}</span><span class="badge badge-green">剩 ${r.qty} ${r.unit}</span></div>`).join('')
    : '<span style="font-size:13px;color:var(--text3)">無剩餘療程</span>';

  const note = document.getElementById('f-note').value;
  const ns = document.getElementById('p-note-section');
  if(note){ ns.style.display='block'; document.getElementById('p-note-val').textContent=note; } else ns.style.display='none';

  const total=parseInt((document.getElementById('sum-total').textContent||'0').replace(/[^0-9]/g,''))||0;
  const paid=Object.values(payState).reduce((s,v)=>s+(parseFloat(v.amount)||0),0);
  const submitBtn=document.getElementById('submit-btn');
  if(submitBtn) submitBtn.disabled = Object.keys(payState).length>0&&paid<total;
}

// ── 送出 ──
async function submitOrder() {
  const name = document.getElementById('f-name').value;
  if(!name){ showToast('請填寫客戶姓名'); goTab('order',document.querySelectorAll('.tab-btn')[0]); return; }
  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = true; submitBtn.textContent = '送出中…';
  setSyncState('loading','傳送資料中…');

  const deduct = parseFloat(document.getElementById('credit-deduct')?.value)||0;
  const maxD = parseFloat(document.getElementById('credit-deduct')?.dataset.max)||0;
  const purchaseItems=[], serviceItems=[];
  document.querySelectorAll('#purchase-list .t-row-buy').forEach(r=>{
    const n=r.querySelector('select').value; if(!n)return;
    purchaseItems.push({name:n,qty:parseFloat(r.querySelectorAll('input')[0].value)||1,unit:r.querySelector('.unit-display').textContent,price:parseFloat(r.querySelectorAll('input')[1].value)||0});
  });
  document.querySelectorAll('#service-list .t-row-svc').forEach(r=>{
    const n=r.querySelector('select').value; if(!n)return;
    serviceItems.push({name:n,qty:parseFloat(r.querySelectorAll('input')[0].value)||1,unit:r.querySelector('.unit-display').textContent,note:r.querySelector('input[type=text]').value||''});
  });
  const sub=purchaseItems.reduce((s,i)=>s+i.price,0);
  const disc=parseFloat(document.getElementById('discount').value)||0;
  const total=Math.max(0,sub-deduct-disc);
  const idLabels={vip:'VIP',mem:'會員',biz:'業務夥伴','':'一般'};
  const payload={
    action:'writeOrder',
    clientName:name, phone:document.getElementById('f-phone').value, birth:document.getElementById('f-birth').value,
    idType:idLabels[currentId]||'一般', owner:document.getElementById('f-owner').value,
    doctor:document.getElementById('f-doctor').value, referrer:document.getElementById('f-ref').value,
    source:document.getElementById('f-source').value,
    subtotal:sub, creditDeduct:deduct, discount:disc, total,
    pay_cash:parseFloat(payState['現金']?.amount)||0,
    pay_transfer:parseFloat(payState['轉帳']?.amount)||0,
    pay_transferBank:payState['轉帳']?.bank||'',
    pay_installment:parseFloat(payState['無卡分期']?.amount)||0,
    creditType:currentId==='vip'?'VIP':currentId==='mem'?'會員':'',
    creditRemainBefore:maxD, creditRemainAfter:deduct>0?Math.max(0,maxD-deduct):'',
    note:document.getElementById('f-note').value,
    purchaseItems, serviceItems,
    remainingPackages:calcRemaining()
  };

  try {
    const res = await fetch(APPS_SCRIPT_URL, { method:'POST', body:JSON.stringify(payload) });
    const json = await res.json();
    if(json.status==='ok'){
      setSyncState('ok','已連線');
      document.getElementById('success-order-id').textContent='訂單編號：'+json.orderId;
      document.getElementById('success-overlay').style.display='flex';
    } else throw new Error(json.message);
  } catch(err) {
    setSyncState('err','傳送失敗');
    showToast('⚠ 傳送失敗：'+err.message);
    submitBtn.disabled=false; submitBtn.textContent='確認結帳並寫入 Google Sheets';
  }
}

// ── 重置 ──
function resetAll() {
  document.getElementById('success-overlay').style.display='none';
  document.getElementById('f-name').value='';
  document.getElementById('f-phone').value='';
  document.getElementById('f-birth').value='';
  document.getElementById('f-owner').value='';
  document.getElementById('f-doctor').value='';
  document.getElementById('f-ref').value='';
  document.getElementById('f-source').value='';
  document.getElementById('f-note').value='';
  document.getElementById('discount').value='0';
  document.getElementById('credit-deduct').value='';
  document.getElementById('purchase-list').innerHTML='';
  document.getElementById('service-list').innerHTML='';
  document.getElementById('svc-warnings').innerHTML='';
  document.getElementById('client-status-card').style.display='none';
  document.getElementById('ref-note').style.display='none';
  document.getElementById('submit-btn').textContent='確認結帳並寫入 Google Sheets';
  Object.keys(payState).forEach(k=>{ delete payState[k]; document.getElementById('chip-'+k)?.classList.remove('on'); });
  document.getElementById('pay-entries').innerHTML='';
  currentId=''; selectedClient=null;
  ['vip','mem','biz'].forEach(t=>document.getElementById('idchip-'+t).className='id-chip');
  initRows(); calcTotal();
  goTab('order',document.querySelectorAll('.tab-btn')[0]);
}

// ── Toast ──
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── 啟動 ──
loadClients();
initRows();
</script>
