<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小新肌診所 — 訂單收據查詢</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f5f5f0;color:#1a1a2e;min-height:100vh}
.search-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.search-card{background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center}
.logo{width:140px;margin-bottom:8px}
.clinic-name{font-size:15px;color:#666;margin-bottom:32px;letter-spacing:.05em}
.search-title{font-size:20px;font-weight:700;margin-bottom:24px}
.field{text-align:left;margin-bottom:16px}
label{font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px}
input{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
input:focus{border-color:#8fbc8f}
.hint{font-size:12px;color:#999;margin-top:6px}
.search-btn{width:100%;padding:14px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
.search-btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{color:#dc2626;font-size:13px;margin-top:12px;display:none}
.receipt-page{display:none;max-width:680px;margin:0 auto;padding:24px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#666;cursor:pointer;margin-bottom:20px;background:none;border:none;font-family:inherit;padding:0}
.receipt{background:#fff;border-radius:16px;padding:40px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.receipt-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1a1a2e;padding-bottom:20px;margin-bottom:24px}
.receipt-logo{width:100px}
.receipt-meta{text-align:right}
.receipt-meta .order-id{font-size:12px;color:#999;margin-bottom:4px}
.receipt-meta .order-date{font-size:14px;font-weight:600}
.pay-status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
.status-paid{background:#dcfce7;color:#16a34a}
.status-deposit{background:#fef9c3;color:#ca8a04}
.status-balance{background:#dbeafe;color:#2563eb}
.client-section{background:#f9f9f7;border-radius:10px;padding:16px 20px;margin-bottom:20px}
.client-name{font-size:20px;font-weight:700;margin-bottom:10px}
.client-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.client-item{font-size:13px;color:#666}
.client-item span{color:#1a1a2e;font-weight:500}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;margin-bottom:10px}
.item-type-label{font-size:11px;font-weight:600;color:#8fbc8f;margin:14px 0 6px;letter-spacing:.05em}
.item-row{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.item-row:last-child{border-bottom:none}
.item-qty{color:#666;font-size:13px;text-align:right}
.item-price{color:#1a1a2e;font-weight:600;text-align:right;min-width:80px}
.amount-section{border-top:1px solid #e0e0e0;padding-top:16px;margin-bottom:20px}
.amount-row{display:flex;justify-content:space-between;font-size:13px;color:#666;padding:4px 0}
.amount-row.total{font-size:17px;font-weight:700;color:#1a1a2e;border-top:1px solid #1a1a2e;margin-top:8px;padding-top:10px}
.amount-row.deduct{color:#16a34a}
.pay-section{background:#f9f9f7;border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:13px}
.sign-section{border-top:2px solid #1a1a2e;padding-top:20px;margin-top:4px}
.sign-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;margin-bottom:12px}
.receipt-footer{text-align:center;margin-top:24px;font-size:11px;color:#bbb;letter-spacing:.05em}
.print-btn{display:block;width:100%;padding:14px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px;font-family:inherit}
@media print{
  .back-btn,.print-btn,.search-page{display:none!important}
  body{background:#fff}
  .receipt-page{padding:0;display:block!important}
  .receipt{box-shadow:none;padding:20px}
}
@media(max-width:600px){
  .receipt{padding:20px}
  .receipt-header{flex-direction:column;gap:12px}
  .receipt-meta{text-align:left}
  .client-grid{grid-template-columns:1fr}
}
</style>
</head>

function showSearch(){
  document.getElementById('search-page').style.display='flex';
  document.getElementById('receipt-page').style.display='none';
  document.getElementById('error-msg').style.display='none';
}

async function doSearch(){
  const oid  = document.getElementById('input-oid').value.trim();
  const name = document.getElementById('input-name').value.trim();
  if(!oid && !name){ showError('請輸入訂單編號或客戶姓名'); return; }
  const btn = document.getElementById('search-btn');
  btn.disabled=true; btn.textContent='查詢中…';
  document.getElementById('error-msg').style.display='none';
  try{
    const url = APPS_SCRIPT_URL+'?action=getOrderReceipt&secret='+API_SECRET
      +(oid?'&orderId='+encodeURIComponent(oid):'')
      +(name?'&name='+encodeURIComponent(name):'');
    const res = await fetch(url);
    const json = await res.json();
    if(json.status!=='ok') throw new Error(json.message||'查無資料');
    renderReceipt(json.order);
  } catch(e){ showError(e.message); }
  btn.disabled=false; btn.textContent='查詢收據';
}

function showError(msg){
  const el=document.getElementById('error-msg');
  el.textContent=msg; el.style.display='block';
}

function renderReceipt(o){
  const statusMap={'paid':'全額付清','deposit':'訂金（尚有尾款）','balance':'補尾款','':'全額付清'};
  const statusClass={'paid':'status-paid','deposit':'status-deposit','balance':'status-balance','':'status-paid'};

  // 付款方式
  const pays=[];
  if(+o.payCash>0) pays.push('現金 NT$ '+Number(o.payCash).toLocaleString());
  if(+o.payTransfer>0) pays.push('轉帳'+(o.payBank?'('+o.payBank+')':'')+' NT$ '+Number(o.payTransfer).toLocaleString());
  if(+o.payInstall>0) pays.push('無卡分期'+(o.payInstallBank?'('+o.payInstallBank+')':'')+' NT$ '+Number(o.payInstall).toLocaleString());

  // 療程明細
  const buys=(o.items||[]).filter(i=>i.type==='購買');
  const svcs=(o.items||[]).filter(i=>i.type==='施作');
  let itemsHtml='';
  if(buys.length){
    itemsHtml+='<div class="item-type-label">購買療程</div>';
    buys.forEach(i=>{ itemsHtml+=`<div class="item-row"><span>${i.name}</span><span class="item-qty">${i.qty} ${i.unit}</span><span class="item-price">NT$ ${Number(i.price).toLocaleString()}</span></div>`; });
  }
  if(svcs.length){
    itemsHtml+='<div class="item-type-label">今日施作</div>';
    svcs.forEach(i=>{ itemsHtml+=`<div class="item-row"><span>${i.name}${i.doctor?'<span style="font-size:11px;color:#999;margin-left:6px">'+i.doctor+'</span>':''}</span><span class="item-qty">${i.qty} ${i.unit}</span><span class="item-price"></span></div>`; });
  }

  // 金額
  let amountHtml=`<div class="amount-row"><span>療程小計</span><span>NT$ ${Number(o.subtotal).toLocaleString()}</span></div>`;
  if(+o.topup>0) amountHtml+=`<div class="amount-row"><span>${o.creditType||''}儲值</span><span>NT$ ${Number(o.topup).toLocaleString()}</span></div>`;
  if(+o.creditDeduct>0) amountHtml+=`<div class="amount-row deduct"><span>儲值金折抵</span><span>－NT$ ${Number(o.creditDeduct).toLocaleString()}</span></div>`;
  if(+o.cashbackDeduct>0) amountHtml+=`<div class="amount-row deduct"><span>回饋金折抵</span><span>－NT$ ${Number(o.cashbackDeduct).toLocaleString()}</span></div>`;
  if(+o.discount>0) amountHtml+=`<div class="amount-row deduct"><span>折扣</span><span>－NT$ ${Number(o.discount).toLocaleString()}</span></div>`;
  amountHtml+=`<div class="amount-row total"><span>應付總額</span><span>NT$ ${Number(o.total).toLocaleString()}</span></div>`;

  // 簽名：把 Drive 連結轉成可直接顯示的圖片
  let signHtml='<div style="font-size:13px;color:#999">未簽名</div>';
  const url = o.signUrl || '';
  if(url && url.startsWith('http') && url !== '未簽名' && url !== '儲存失敗'){
    // Apps Script 新版回傳格式：thumbnailUrl|viewUrl
    // 舊版格式：直接是 Drive view URL
    let imgSrc, viewUrl;
    if(url.includes('|')){
      [imgSrc, viewUrl] = url.split('|');
    } else {
      const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      imgSrc = m ? 'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w600' : url;
      viewUrl = url;
    }
    signHtml = `
      <img src="${imgSrc}" alt="客戶簽名"
        style="max-width:300px;width:100%;border:1px solid #e0e0e0;border-radius:8px;background:#f9f9f7;display:block;margin-bottom:8px"
        onerror="this.style.display='none';document.getElementById('sign-fallback').style.display='block'">
      <div id="sign-fallback" style="display:none;font-size:13px;color:#999;margin-bottom:8px">
        圖片無法嵌入，<a href="${viewUrl}" target="_blank" style="color:#2563eb">點此在 Drive 開啟</a>
      </div>
      <a href="${viewUrl}" target="_blank" style="font-size:12px;color:#aaa">→ Drive 原始檔案</a>`;
  }

  const html=`
    <div class="receipt-header">
      <img src="${LOGO_SRC}" class="receipt-logo" alt="小新肌">
      <div class="receipt-meta">
        <div class="order-id">${o.orderId}</div>
        <div class="order-date">${o.date}</div>
        <div class="pay-status ${statusClass[o.payStatus]||'status-paid'}">${statusMap[o.payStatus]||'全額付清'}</div>
      </div>
    </div>
    <div class="client-section">
      <div class="client-name">${o.clientName}</div>
      <div class="client-grid">
        <div class="client-item">電話 <span>${o.phone}</span></div>
        <div class="client-item">身分 <span>${o.idType||'一般'}</span></div>
        ${o.owner?'<div class="client-item">結帳者 <span>'+o.owner+'</span></div>':''}
        ${o.doctor?'<div class="client-item">執行醫師 <span>'+o.doctor+'</span></div>':''}
      </div>
    </div>
    <div style="margin-bottom:20px">
      <div class="section-title">療程明細</div>
      ${itemsHtml||'<div style="font-size:13px;color:#999">無療程記錄</div>'}
    </div>
    <div class="amount-section">
      <div class="section-title">費用摘要</div>
      ${amountHtml}
    </div>
    <div class="pay-section">
      <div class="section-title" style="margin-bottom:8px">付款方式</div>
      ${pays.length?pays.map(p=>'<div style="font-size:13px;color:#444;padding:3px 0">'+p+'</div>').join(''):'<div style="font-size:13px;color:#999">—</div>'}
    </div>
    ${o.note?'<div style="font-size:13px;color:#666;background:#fffbeb;border-radius:8px;padding:12px 14px;margin-bottom:20px">備註：'+o.note+'</div>':''}
    <div class="sign-section">
      <div class="sign-title">客戶簽名確認</div>
      ${signHtml}
    </div>
    <div class="receipt-footer">小新肌診所　Little Secret　感謝您的消費，期待再次為您服務</div>
  `;

  document.getElementById('receipt-content').innerHTML=html;
  document.getElementById('search-page').style.display='none';
  document.getElementById('receipt-page').style.display='block';
}

document.addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
</script>
</body>
</html>
